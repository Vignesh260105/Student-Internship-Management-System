services:
- type: web
  name: sims-db
  env: docker
  dockerContext: .
  dockerfilePath: database/Dockerfile
  plan: free
  region: singapore
  envVars:
  - key: MYSQL_ROOT_PASSWORD
    value: password
  - key: MYSQL_DATABASE
    value: sims
- type: web
  name: sims-backend
  env: docker
  dockerContext: .
  dockerfilePath: backend/Dockerfile
  plan: free
  region: singapore
  envVars:
  - key: PORT
    value: 8080
  - key: DB_HOST
    value: sims-db
  - key: DB_PORT
    value: 3306
  - key: DB_NAME
    value: sims
  - key: DB_USERNAME
    value: root
  - key: DB_PASSWORD
    value: password
- type: web
  name: sims-frontend
  env: static
  buildCommand: npm run build
  publishDir: build
  plan: free
  region: singapore
  envVars:
  - key: REACT_APP_API_URL
    value: https://sims-backend.onrender.com
