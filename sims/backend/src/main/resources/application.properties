# ===========================
# Application Configuration
# ===========================
spring.application.name=student-internship-management

# ===========================
# MySQL Database Configuration
# ===========================
# Change username/password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/sims_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate Settings
# ===========================
# update = auto-updates schema on startup; use validate in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===========================
# JWT Configuration
# ===========================
# Secret key for signing JWT tokens (keep this secret in production!)
app.jwt.secret=SimsJwtSecretKey2024ThisIsAVeryLongSecretKeyForSecurity
# Token expiry in milliseconds: 86400000 = 24 hours
app.jwt.expiration=86400000

# ===========================
# Server Configuration
# ===========================
server.port=8082

# Allow cross-origin requests from React frontend
# (Also configured in SecurityConfig)
